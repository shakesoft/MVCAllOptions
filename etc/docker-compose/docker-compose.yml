services:
  mvcalloptions-web:
    image: mvcalloptions-web:latest
    container_name: mvcalloptions-web
    hostname: mvcalloptions-web
    build:
      context: ../../
      dockerfile: src/MVCAllOptions.Web/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=37c024b4-4e55-478e-9c50-63df6b03942c
      - App__SelfUrl=https://localhost:44324
      - App__HealthCheckUrl=http://mvcalloptions-web:8080/health-status
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__Authority=http://mvcalloptions-web:8080      
      - App__MVCPublicUrl=https://localhost:44372
      - ConnectionStrings__Default=Data Source=sql-server;Initial Catalog=MVCAllOptions;User Id=sa;Password=myPassw0rd;MultipleActiveResultSets=true;TrustServerCertificate=True;
      - Redis__Configuration=redis
    ports:
      - "44324:8081"
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network

  

  mvcalloptions-web-public:
    image: mvcalloptions-web-public:latest
    container_name: mvcalloptions-web-public
    build:
      context: ../../
      dockerfile: src/MVCAllOptions.Web.Public/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=37c024b4-4e55-478e-9c50-63df6b03942c
      - App__SelfUrl=https://localhost:44372
      - App__HealthCheckUrl=http://mvcalloptions-web-public:8080/health-status
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__IsOnK8s=true      
      - RemoteServices__Default__BaseUrl=http://mvcalloptions-api:8080
      - AuthServer__Authority=https://localhost:44328/
      - AuthServer__MetaAddress=http://mvcalloptions-api:8080
      - ConnectionStrings__Default=Data Source=sql-server;Initial Catalog=MVCAllOptions;User Id=sa;Password=myPassw0rd;MultipleActiveResultSets=true;TrustServerCertificate=True;
      - Redis__Configuration=redis
    ports:
      - "44372:8081"
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network  
  
  db-migrator:
    image: mvcalloptions-db-migrator:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: src/MVCAllOptions.DbMigrator/Dockerfile.local
    environment:
      - OpenIddict__Applications__MVCAllOptions_Web__RootUrl=https://localhost:44324
      - OpenIddict__Applications__MVCAllOptions_Swagger__RootUrl=https://localhost:44328
      - OpenIddict__Applications__MVCAllOptions_Web_Public__RootUrl=https://localhost:44372
      - ConnectionStrings__Default=Data Source=sql-server;Initial Catalog=MVCAllOptions;User Id=sa;Password=myPassw0rd;MultipleActiveResultSets=true;TrustServerCertificate=True;
      - Redis__Configuration=redis
    restart: on-failure
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - abp-network
  
  sql-server:
    container_name: sql-server
    image: mcr.microsoft.com/azure-sql-edge:1.0.7
    ports:
      - "1434:1433"
    environment:
      SA_PASSWORD: "myPassw0rd"
      ACCEPT_EULA: "Y"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - abp-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S sql-server -U sa -P "myPassw0rd" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - abp-network
    healthcheck:
      test: ["CMD", "redis-cli","ping"]

volumes:
  sqldata:
    name: mvcalloptions_sqldata
networks:
  abp-network:
    name: mvcalloptions-network
    driver: bridge